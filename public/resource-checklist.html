<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solomon 리소스 체크리스트</title>
<style>
:root{--bg:#FFFDF8;--side:#FFFBF2;--card:#FFF;--bdr:#F0E4CC;--acc:#D97706;--acc2:#B45309;--peach:#FFB5A7;--txt:#3D3328;--t2:#8A7E6B;--t3:#C4BAA8;--ok:#81C995;--okbg:#EEFBF0;--warn:#F28B82;--wbg:#FFF0F0;--blu:#7EB8E0;--blubg:#EDF6FF;--pur:#B39DDB;--purbg:#F3EEFF;--ambg:rgba(217,119,6,0.08);
--preview-bg:#030712;--preview-card:#111827;--preview-input:#1f2937;--preview-txt:#f3f4f6;--preview-sub:#9ca3af;--preview-dim:#4b5563;--preview-accent:#fbbf24;--preview-accent2:#f59e0b;--preview-accent3:#d97706;--preview-charA:#60a5fa;--preview-charA-active:#2563eb;--preview-charA-bubble:#172554;--preview-charB:#fb7185;--preview-charB-active:#e11d48;--preview-charB-bubble:#4c0519;--preview-ok:#34d399;--preview-err:#f87171;--preview-purple:#c084fc;--preview-system:#fbbf24}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ── */
.sb-wrap{position:relative;display:flex;flex-shrink:0}
.sb{width:260px;min-width:260px;background:var(--side);border-right:1.5px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;transition:width .2s,min-width .2s,opacity .2s}
.sb.collapsed{width:0;min-width:0;border-right:none;opacity:0;pointer-events:none}
.sb-toggle{position:absolute;top:50%;right:-14px;transform:translateY(-50%);z-index:10;width:14px;height:48px;background:var(--side);border:1.5px solid var(--bdr);border-left:none;border-radius:0 8px 8px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--t2);padding:0}
.sb-toggle:hover{background:#FFF8EA;color:var(--txt)}
.sb-hd{padding:14px 14px 10px;border-bottom:1px solid var(--bdr)}
.sb-hd h1{font-size:14px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.sb-hd h1 span{color:var(--acc)}
.sb-hd .bar{height:6px;background:var(--bdr);border-radius:3px;overflow:hidden}
.sb-hd .fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:3px;transition:width .3s}
.sb-hd .info{font-size:11px;color:var(--t2);margin-top:4px;display:flex;justify-content:space-between}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0}
.ng{margin-bottom:1px}
.ng-t{display:flex;align-items:center;gap:5px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;user-select:none;color:var(--txt)}
.ng-t:hover{background:#FFF8EA}
.ng-t .ar{font-size:9px;transition:transform .2s;width:12px}
.ng-t .ar.op{transform:rotate(90deg)}
.ng-t .gp{margin-left:auto;font-size:10px;font-weight:400;color:var(--t2);white-space:nowrap}
.ni-wrap{overflow:hidden;max-height:0;transition:max-height .25s ease}
.ni-wrap.op{max-height:2000px}
.ni{display:flex;align-items:center;gap:5px;padding:5px 14px 5px 28px;font-size:11px;cursor:pointer;color:var(--t2);border-left:3px solid transparent;transition:all .15s}
.ni:hover{background:#FFF8EA;color:var(--txt)}
.ni.act{background:#FFF8EA;color:var(--txt);border-left-color:var(--acc);font-weight:600}
.ni .sp{margin-left:auto;font-size:10px;background:var(--bdr);padding:1px 5px;border-radius:8px;white-space:nowrap}
.ni .sp.dn{background:var(--okbg);color:var(--ok)}
/* Summary nav special */
.nav-summary{display:flex;align-items:center;gap:6px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;border-bottom:1px solid var(--bdr);color:var(--acc)}
.nav-summary:hover,.nav-summary.act{background:#FFF8EA}
.sb-ft{padding:8px 12px;border-top:1px solid var(--bdr);display:flex;gap:5px;flex-wrap:wrap}
.sb-ft button{flex:1;padding:4px 0;border:1px solid var(--bdr);border-radius:14px;background:var(--card);font-size:10px;cursor:pointer;font-family:inherit}
.sb-ft button:hover{background:var(--acc);border-color:var(--acc2);color:#fff}
.sb-ft .dg:hover{background:var(--wbg);border-color:var(--warn);color:var(--warn)}

/* ── Main ── */
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid var(--bdr);background:var(--card);min-height:44px}
.topbar h2{font-size:14px;white-space:nowrap}
.topbar .bc{font-size:11px;color:var(--t2)}
.topbar input{flex:1;max-width:260px;padding:5px 12px;border:1px solid var(--bdr);border-radius:18px;font-size:11px;background:var(--bg);margin-left:auto}
.topbar select{padding:5px 10px;border:1px solid var(--bdr);border-radius:18px;font-size:11px;background:var(--bg)}
.ct{flex:1;overflow-y:auto;padding:12px 16px 40px}

/* ── Guide ── */
.guide{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px 16px;margin-bottom:14px;font-size:12px;line-height:1.7;color:var(--t2)}
.guide h3{font-size:13px;color:var(--txt);margin-bottom:6px}
.guide .hl{color:var(--txt);font-weight:600}
.guide code{background:#FFF8EA;padding:1px 6px;border-radius:4px;font-size:11px}

/* ── Progress bar ── */
.sp-box{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:8px 12px;background:var(--card);border:1px solid var(--bdr);border-radius:10px}
.sp-box .bar{flex:1;height:7px;background:var(--bdr);border-radius:4px;overflow:hidden}
.sp-box .fill{height:100%;background:var(--acc);border-radius:4px;transition:width .3s}
.sp-box .tx{font-size:12px;font-weight:700;white-space:nowrap}

/* ── Table ── */
table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px}
thead th{position:sticky;top:0;background:var(--side);border-bottom:2px solid var(--bdr);padding:7px 8px;text-align:left;font-size:11px;font-weight:700;color:var(--t2);white-space:nowrap;z-index:2}
thead th:first-child{width:32px;text-align:center}
tbody tr{transition:opacity .15s}
tbody tr:hover{background:#FFFAF0}
tbody tr.ck{opacity:.4}
tbody tr.ck td.cn{text-decoration:line-through}
tbody td{padding:6px 8px;border-bottom:1px solid #F5F0E5;vertical-align:top}
td.cc{text-align:center;width:32px}
td.cc input{width:15px;height:15px;accent-color:var(--acc);cursor:pointer}
td.cp{width:48px;text-align:center}
td.cp .emoji{font-size:20px}
td.cn{font-weight:600;min-width:100px;white-space:nowrap}
td.cf{font-size:11px;color:var(--t2);max-width:150px;word-break:break-all;font-family:'Consolas','Courier New',monospace}
td.cs{font-size:11px;color:var(--t2);white-space:nowrap}
td.cu{font-size:11px;color:var(--txt);max-width:280px;line-height:1.5}
td.cmo{width:130px}
td.cmo textarea{width:100%;min-height:26px;max-height:56px;border:1px solid var(--bdr);border-radius:5px;padding:3px 7px;font-size:10px;font-family:inherit;resize:vertical;background:var(--card);color:var(--txt)}
td.cmo textarea::placeholder{color:var(--t3)}

/* Tags */
.tg{display:inline-block;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700}
.tg.ok{background:var(--okbg);color:var(--ok)}
.tg.none{background:var(--wbg);color:var(--warn)}
.tg.partial{background:#FFF3E0;color:#E68A00}
.tg.emoji{background:#FFF0E0;color:#E68A00}
.tg.css{background:#F0F0F0;color:#888}

/* Tooltip ? icon */
.audio-btn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--acc);border:none;color:var(--txt);font-size:10px;cursor:pointer;margin:0 4px;vertical-align:middle;transition:background .15s}
.audio-btn:hover{background:var(--acc2)}
.tip{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:var(--bdr);color:var(--t2);font-size:9px;font-weight:700;cursor:help;position:relative;vertical-align:middle;margin-left:4px;flex-shrink:0}
.tip:hover .tip-box{display:block}
.tip-box{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--txt);color:#fff;padding:8px 12px;border-radius:8px;font-size:11px;font-weight:400;line-height:1.5;white-space:normal;width:260px;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.tip-box::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--txt)}

/* ── Summary ── */
.sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:20px}
.sum-card{background:var(--card);border:1.5px solid var(--bdr);border-radius:12px;padding:14px;cursor:pointer;transition:all .15s}
.sum-card:hover{border-color:var(--acc);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.sum-card .sc-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sum-card .sc-icon{font-size:20px}
.sum-card .sc-title{font-size:13px;font-weight:700}
.sum-card .sc-bar{height:6px;background:var(--bdr);border-radius:3px;overflow:hidden;margin-bottom:4px}
.sum-card .sc-fill{height:100%;background:var(--acc);border-radius:3px;transition:width .3s}
.sum-card .sc-stat{font-size:11px;color:var(--t2);display:flex;justify-content:space-between}
.sum-card .sc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.sum-card .sc-tag{font-size:10px;padding:2px 7px;border-radius:6px}

/* Comment tables */
.cmt-section{margin-top:20px}
.cmt-section h3{font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.cmt-section h3 .cmt-icon{font-size:16px}
.cmt-tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;margin-bottom:16px}
.cmt-tbl thead th{background:var(--side);border-bottom:2px solid var(--bdr);padding:8px 10px;text-align:left;font-size:11px;font-weight:700;color:var(--t2)}
.cmt-tbl thead th:first-child{width:32px;text-align:center}
.cmt-tbl thead th:nth-child(2){min-width:180px}
.cmt-tbl tbody td{padding:6px 8px;border-bottom:1px solid #F5F0E5;vertical-align:top}
.cmt-tbl tbody td:first-child{text-align:center;font-weight:700;color:var(--t2);width:32px}
.cmt-tbl tbody td textarea{width:100%;min-height:32px;max-height:80px;border:1px solid var(--bdr);border-radius:6px;padding:5px 8px;font-size:11px;font-family:inherit;resize:vertical;background:var(--card);color:var(--txt)}
.cmt-tbl tbody td textarea::placeholder{color:var(--t3)}
.cmt-tbl tbody td textarea.c1{background:#FFF8EA}
.cmt-tbl tbody td textarea.c2{background:#EDF6FF}
.cmt-tbl tbody td textarea.c3{background:#F3EEFF}
.cmt-add{display:inline-flex;align-items:center;gap:4px;padding:4px 14px;border:1px dashed var(--bdr);border-radius:8px;background:transparent;font-size:11px;color:var(--t2);cursor:pointer;font-family:inherit;margin-top:2px}
.cmt-add:hover{border-color:var(--acc);color:var(--txt);background:#FFF8EA}
.cmt-rm{width:22px;height:22px;border:1px solid var(--bdr);border-radius:6px;background:transparent;color:var(--t3);cursor:pointer;font-size:14px;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;padding:0}
.cmt-rm:hover{border-color:var(--warn);color:var(--warn);background:var(--wbg)}

/* Google Sheets save */
.gs-setup{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px 16px;margin-top:16px}
.gs-setup h4{font-size:13px;margin-bottom:8px}
.gs-setup .gs-input{width:100%;padding:6px 10px;border:1px solid var(--bdr);border-radius:8px;font-size:11px;font-family:inherit;background:var(--bg);color:var(--txt)}
.gs-setup .gs-input::placeholder{color:var(--t3)}
.gs-setup .gs-hint{font-size:10px;color:var(--t2);margin-top:4px;line-height:1.6}
.gs-setup code{background:#FFF8EA;padding:1px 5px;border-radius:3px;font-size:10px}
.gs-status{font-size:11px;margin-top:6px;padding:4px 8px;border-radius:6px;display:inline-block}
.gs-status.ok{background:var(--okbg);color:var(--ok)}
.gs-status.err{background:var(--wbg);color:var(--warn)}

/* Version panel */
.ver-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(61,51,40,.4);z-index:997;align-items:center;justify-content:center}
.ver-overlay.show{display:flex}
.ver-panel{width:480px;max-width:90vw;max-height:80vh;background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 40px rgba(0,0,0,.2);overflow-y:auto}
.ver-panel h3{font-size:14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.ver-panel .ver-close{border:none;background:transparent;font-size:18px;cursor:pointer;color:var(--t2)}
.ver-list{list-style:none}
.ver-list li{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-bottom:1px solid #F5F0E5;font-size:12px}
.ver-list li:last-child{border-bottom:none}
.ver-list .ver-time{color:var(--txt);font-weight:600}
.ver-list .ver-info{color:var(--t2);font-size:10px}
.ver-list button{padding:3px 12px;border:1px solid var(--bdr);border-radius:8px;background:var(--bg);font-size:10px;cursor:pointer;font-family:inherit;color:var(--txt)}
.ver-list button:hover{background:#FFF8EA;border-color:var(--acc)}
.ver-empty{text-align:center;color:var(--t3);font-size:12px;padding:20px}

/* ── Palette (inside theme group) ── */
.pal-wrap{display:flex;gap:16px;align-items:flex-start}
.pal-left{flex:1;min-width:0;overflow-y:auto;max-height:calc(100vh - 120px)}
.pal-right{width:340px;min-width:340px;position:sticky;top:0}
.pal-section{margin-bottom:20px}
.pal-section h3{font-size:13px;margin-bottom:8px;color:var(--txt)}
.pal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.pal-card{background:var(--card);border:1.5px solid var(--bdr);border-radius:10px;overflow:hidden;transition:border-color .15s}
.pal-card:hover{border-color:var(--acc)}
.pal-swatch{height:48px;position:relative;cursor:pointer}
.pal-info{padding:8px 10px}
.pal-name{font-size:11px;font-weight:700;margin-bottom:1px;display:flex;justify-content:space-between;align-items:center}
.pal-use{font-size:9px;color:var(--t2);line-height:1.4;margin-bottom:4px}
.pal-hex-row{display:flex;align-items:center;gap:4px}
.pal-color-input{width:28px;height:28px;border:1px solid var(--bdr);border-radius:4px;padding:0;cursor:pointer;background:transparent}
.pal-color-input::-webkit-color-swatch-wrapper{padding:1px}
.pal-color-input::-webkit-color-swatch{border:none;border-radius:3px}
.pal-hex-text{width:72px;padding:2px 5px;border:1px solid var(--bdr);border-radius:5px;font-size:10px;font-family:'Consolas','Courier New',monospace;color:var(--txt);background:var(--bg)}
.pal-hex-text:focus{border-color:var(--acc);outline:none}
.pal-item-reset{border:none;background:transparent;color:var(--t3);cursor:pointer;font-size:9px;padding:1px 4px;font-family:inherit;white-space:nowrap;border-radius:4px}
.pal-item-reset:hover{color:var(--warn);background:var(--wbg)}
.pal-item-reset.hidden{display:none}

/* Preview panel */
.pal-preview{background:var(--card);border:1.5px solid var(--bdr);border-radius:14px;padding:14px;margin-bottom:10px}
.pal-pv-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pal-pv-header h3{font-size:12px;margin:0}
.pal-pv-tools{display:flex;gap:4px;align-items:center}
.pal-pv-tools button{border:1px solid var(--bdr);border-radius:8px;background:var(--bg);cursor:pointer;font-family:inherit;font-size:10px;padding:3px 8px;color:var(--txt)}
.pal-pv-tools button:hover{border-color:var(--acc);background:#FFF8EA}
.pal-reset-btn{padding:3px 10px;border:1px solid var(--bdr);border-radius:10px;background:var(--bg);font-size:9px;cursor:pointer;font-family:inherit;color:var(--warn)}
.pal-reset-btn:hover{background:var(--wbg);border-color:var(--warn)}
.pal-pv-app{border-radius:10px;padding:12px;min-height:180px;transition:background .2s}
.pal-pv-btn{display:inline-block;padding:5px 14px;border-radius:20px;font-size:10px;font-weight:700;cursor:default;transition:all .2s;margin-right:4px;margin-bottom:4px}
.pal-pv-stat{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:600;margin-right:4px;margin-bottom:4px;transition:all .2s}

/* ── Enhanced Table ── */
td.cdur{font-size:11px;color:var(--t2);white-space:nowrap;width:60px}
td.cmood{font-size:11px;color:var(--txt);max-width:200px;line-height:1.4}
td.cwave{font-size:11px;color:var(--t2);white-space:nowrap;font-family:'Consolas','Courier New',monospace}
td.cpitch{font-size:11px;color:var(--t2);white-space:nowrap;font-family:'Consolas','Courier New',monospace}
td.csize{font-size:11px;color:var(--t2);white-space:nowrap}
td.cfmt{font-size:11px;color:var(--t2);white-space:nowrap}
td.cpri{font-size:11px;white-space:nowrap}
td.cpri .pri-req{color:var(--warn);font-weight:700}
td.cpri .pri-rec{color:#E68A00;font-weight:600}
td.cpri .pri-opt{color:var(--t2)}
td.cloop{font-size:11px;color:var(--t2);white-space:nowrap}

/* ── Subgroup header ── */
.subgroup-hd{background:var(--ambg);padding:8px 12px;margin:12px 0 4px;border-radius:8px;font-size:12px;font-weight:700;color:var(--acc2);display:flex;align-items:center;gap:6px}
.subgroup-hd .sg-icon{font-size:14px}

/* Enlarged preview overlay */
.pal-enlarge{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(61,51,40,.5);z-index:998;align-items:center;justify-content:center;cursor:pointer}
.pal-enlarge.show{display:flex}
.pal-enlarge-inner{width:420px;max-width:90vw;max-height:90vh;overflow-y:auto;background:var(--bg);border-radius:16px;padding:20px;box-shadow:0 8px 40px rgba(0,0,0,.25);cursor:default}
</style>
</head>
<body>

<!-- Version panel -->
<div class="ver-overlay" id="verOverlay" onclick="if(event.target===this)this.classList.remove('show')"><div class="ver-panel" id="verPanel"></div></div>
<!-- Palette enlarge -->
<div class="pal-enlarge" id="palEnlarge" onclick="if(event.target===this)this.classList.remove('show')"><div class="pal-enlarge-inner" id="palEnlargeInner"></div></div>

<div class="sb-wrap">
  <aside class="sb" id="sidebar">
    <div class="sb-hd">
      <h1><span>&#9878;</span> Solomon 리소스 체크리스트</h1>
      <div class="bar"><div class="fill" id="tFill"></div></div>
      <div class="info"><span id="tTxt">0/0</span><span id="tPct">0%</span></div>
    </div>
    <div class="nav-summary act" id="navSum" onclick="showSummary()"><span>&#x1F4CA; Summary</span></div>
    <nav class="sb-nav" id="nav"></nav>
    <div class="sb-ft">
      <button onclick="saveToSheet()" id="btnSave">저장</button>
      <button onclick="showVersions()" id="btnVer">버전</button>
      <button class="dg" onclick="rstAll()">초기화</button>
    </div>
  </aside>
  <button class="sb-toggle" id="sbToggle" onclick="toggleSidebar()">&#9664;</button>
</div>

<div class="mn">
  <div class="topbar">
    <span class="bc" id="bc"></span>
    <h2 id="pt">Summary</h2>
    <input type="text" id="sBox" placeholder="검색...">
    <select id="fSel" onchange="flt()"><option value="all">전체</option><option value="uc">미완료</option><option value="c">완료</option></select>
  </div>
  <div class="ct" id="ct"></div>
</div>

<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
const D=[
// ── 0. 테마 & 컬러 ──
{id:'theme',title:'테마 & 컬러',icon:'\uD83C\uDFA8',subs:[
{id:'pal-bg',title:'배경 계열',items:[

function getAllPalItems(){
  const g=D.find(x=>x.id==='theme');
  if(!g)return[];
  const items=[];
  g.subs.forEach(s=>s.items.forEach(i=>{if(i.hex)items.push(i);}));
  return items;
}

function getPalColor(item){
  return S.r['pal_'+item.id]||item.hex;
}
function setPalColor(id,val){
  S.r['pal_'+id]=val;sv();
}

function onReq(ta){S.r[ta.dataset.rk]=ta.value;clearTimeout(mt);mt=setTimeout(sv,400);}
function cmtAdd(key){const n=cmtCount(key);cmtSetCount(key,n+1);showSummary();}
function cmtRm(key,idx){
  const n=cmtCount(key);if(n<=1)return;
  for(let i=idx;i<n-1;i++){
    const from=key+(i+2),to=key+(i+1);
    ['_t','_1','_2','_3'].forEach(suf=>{S.r[to+suf]=S.r[from+suf]||'';});
  }
  const last=key+n;
  ['_t','_1','_2','_3'].forEach(suf=>{delete S.r[last+suf];});
  cmtSetCount(key,n-1);showSummary();
}

function onPalColor(inp){
  const v=inp.value,pid=inp.dataset.pid;
  setPalColor(pid,v);
  // sync hex text
  const card=inp.closest('.pal-card');
  if(card){
    const txt=card.querySelector('.pal-hex-text');if(txt)txt.value=v;
    const sw=card.querySelector('.pal-swatch');if(sw)sw.style.background=v;
    const rb=card.querySelector('.pal-item-reset');if(rb)rb.classList.remove('hidden');
  }
  // update CSS var
  const item=getAllPalItems().find(i=>i.id===pid);
  if(item&&item.cssVar)document.documentElement.style.setProperty(item.cssVar,v);
  clearTimeout(mt);mt=setTimeout(updatePalPreview,100);
}

function onPalHex(inp){
  const v=inp.value.trim(),pid=inp.dataset.pid;
  if(!/^#[0-9A-Fa-f]{3,8}$/.test(v))return;
  setPalColor(pid,v);
  const card=inp.closest('.pal-card');
  if(card){
    const ci=card.querySelector('.pal-color-input');if(ci)ci.value=v;
    const sw=card.querySelector('.pal-swatch');if(sw)sw.style.background=v;
    const rb=card.querySelector('.pal-item-reset');if(rb)rb.classList.remove('hidden');
  }
  const item=getAllPalItems().find(i=>i.id===pid);
  if(item&&item.cssVar)document.documentElement.style.setProperty(item.cssVar,v);
  clearTimeout(mt);mt=setTimeout(updatePalPreview,100);
}

  }

  sub.items.forEach(item=>{
    const ck=S.c[item.id]||false;
    const nt=S.n[item.id]||'';
    const pvH=`<span class="emoji">${item.pv||'-'}</span>`;
    const tipH=item.tip?`<span class="tip">?<span class="tip-box">${item.tip}</span></span>`:'';
    const tagLabels={'ok':'OK','none':'\uC5C6\uC74C','partial':'\uBD80\uBD84','emoji':'Emoji','css':'CSS'};
    const tagLabel=tagLabels[item.tg]||item.tg;

    if(isSound){
      const audioBtn = item.f && item.tg==='ok' ? `<button class="audio-btn" onclick="event.stopPropagation();playPreview('${item.f}')" title="미리듣기">&#9654;</button>` : '';
      h+=`<tr class="${ck?'ck':''}" data-i="${item.id}"><td class="cc"><input type="checkbox" data-id="${item.id}" ${ck?'checked':''} onchange="chk(this)"></td>`;
      h+=`<td class="cp">${pvH}</td>`;
      h+=`<td class="cn">${item.n} ${audioBtn}<span class="tg ${item.tg}">${tagLabel}</span></td>`;
      h+=`<td class="cdur">${item.dur||item.f||'-'}</td>`;
      h+=`<td class="cmood">${item.mood||item.brief}${tipH}</td>`;
      h+=`<td class="cwave">${item.wave||'-'}</td>`;
      h+=`<td class="cpitch">${isBGM?(item.loop||'-'):(item.pitch||'-')}</td>`;
      h+=`<td class="cmo"><textarea data-id="${item.id}" placeholder="\uBA54\uBAA8..." oninput="memo(this)">${nt}</textarea></td></tr>`;
    }else if(isVisual){
      h+=`<tr class="${ck?'ck':''}" data-i="${item.id}"><td class="cc"><input type="checkbox" data-id="${item.id}" ${ck?'checked':''} onchange="chk(this)"></td>`;
      h+=`<td class="cp">${pvH}</td>`;
      h+=`<td class="cn">${item.n} <span class="tg ${item.tg}">${tagLabel}</span></td>`;
      h+=`<td class="csize">${item.imgSize||'-'}</td>`;
      h+=`<td class="cfmt">${item.imgFmt||'-'}</td>`;
      h+=`<td class="cu">${item.brief}${tipH}</td>`;
      h+=`<td class="cmo"><textarea data-id="${item.id}" placeholder="\uBA54\uBAA8..." oninput="memo(this)">${nt}</textarea></td></tr>`;
    }else if(isUI&&sub.subgroup==='design'){
      h+=`<tr class="${ck?'ck':''}" data-i="${item.id}"><td class="cc"><input type="checkbox" data-id="${item.id}" ${ck?'checked':''} onchange="chk(this)"></td>`;
      h+=`<td class="cp">${pvH}</td>`;
      h+=`<td class="cn">${item.n} <span class="tg ${item.tg}">${tagLabel}</span></td>`;
      h+=`<td class="cu">${item.needRes||'-'}</td>`;
      h+=`<td class="cu">${item.brief}${tipH}</td>`;
      h+=`<td class="cmo"><textarea data-id="${item.id}" placeholder="\uBA54\uBAA8..." oninput="memo(this)">${nt}</textarea></td></tr>`;
    }else{
      h+=`<tr class="${ck?'ck':''}" data-i="${item.id}"><td class="cc"><input type="checkbox" data-id="${item.id}" ${ck?'checked':''} onchange="chk(this)"></td><td class="cp">${pvH}</td><td class="cn">${item.n} <span class="tg ${item.tg}">${tagLabel}</span></td><td class="cu">${item.brief}${tipH}</td><td class="cmo"><textarea data-id="${item.id}" placeholder="\uBA54\uBAA8..." oninput="memo(this)">${nt}</textarea></td></tr>`;
    }
  });
  h+=`</tbody></table>`;
  document.getElementById('ct').innerHTML=h;
  flt();
}

// ══════════ AUDIO PREVIEW ══════════
let _previewAudio=null;
function playPreview(src){
  if(_previewAudio){_previewAudio.pause();_previewAudio=null;}
  _previewAudio=new Audio(src);
  _previewAudio.volume=0.4;
  _previewAudio.play().catch(()=>{});
  _previewAudio.onended=()=>{_previewAudio=null;};
}

// ══════════ ACTIONS ══════════
function chk(cb){
  S.c[cb.dataset.id]=cb.checked;
  cb.closest('tr').classList.toggle('ck',cb.checked);
  sv();rNav();
  if(curView){
    const ni=document.querySelector(`.ni[data-s="${curView.sid}"]`);if(ni)ni.classList.add('act');
    document.getElementById('w-'+curView.gid).classList.add('op');
    document.getElementById('a-'+curView.gid).classList.add('op');
  }
  uSP();
}
function uSP(){
  const b=document.querySelector('.sp-box');if(!b)return;
  const cbs=document.querySelectorAll('#ct input[type="checkbox"]');
  let t=cbs.length,d=0;cbs.forEach(c=>{if(c.checked)d++});
  const p=t?Math.round(d/t*100):0;
  b.querySelector('.tx').textContent=`${d}/${t} (${p}%)`;
  b.querySelector('.fill').style.width=p+'%';
}
let mt;function memo(ta){S.n[ta.dataset.id]=ta.value;clearTimeout(mt);mt=setTimeout(sv,400);}

// ══════════ TOTAL ══════════
function uTP(){
  const ac=allCount();const p=ac.t?Math.round(ac.d/ac.t*100):0;
  document.getElementById('tFill').style.width=p+'%';
  document.getElementById('tTxt').textContent=ac.d+'/'+ac.t;
  document.getElementById('tPct').textContent=p+'%';
}

// ══════════ FILTER ══════════
document.addEventListener('DOMContentLoaded',()=>{
  rNav();uTP();showSummary();
  document.getElementById('sBox').addEventListener('input',flt);
});
function flt(){
  const q=document.getElementById('sBox').value.toLowerCase();
  const f=document.getElementById('fSel').value;
  document.querySelectorAll('#ct tbody tr').forEach(tr=>{
    const txt=tr.textContent.toLowerCase();
    const ck=tr.querySelector('input[type="checkbox"]')?.checked;
    let ok=true;
    if(q&&!txt.includes(q))ok=false;
    if(f==='c'&&!ck)ok=false;
    if(f==='uc'&&ck)ok=false;
    tr.style.display=ok?'':'none';
  });
}

const GS_URL='https://script.google.com/macros/s/AKfycbzA2K_BMp691sihnuqF7Oyy28Ff8HqeMNkww9flMzfVJUW5s1bOVGNDJk4gK3skBuki/exec';

// ── Save: compact state ──
function compact(s){
  const o={};
  if(s.c){const a=Object.keys(s.c).filter(k=>s.c[k]);if(a.length)o.c=a;}
  if(s.n){const n={};Object.entries(s.n).forEach(([k,v])=>{if(v&&v.trim())n[k]=v;});if(Object.keys(n).length)o.n=n;}
  if(s.r){const r={};Object.entries(s.r).forEach(([k,v])=>{if(v&&String(v).trim())r[k]=v;});if(Object.keys(r).length)o.r=r;}
  return o;
}

// ── JSONP helper ──
function gsJsonp(params){
  return new Promise((resolve,reject)=>{
    const cb='_gs_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    window[cb]=function(data){delete window[cb];if(sc2.parentNode)sc2.parentNode.removeChild(sc2);resolve(data);};
    params.callback=cb;
    const qs=Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
    const sc2=document.createElement('script');
    sc2.src=GS_URL+'?'+qs;
    sc2.onerror=function(){delete window[cb];if(sc2.parentNode)sc2.parentNode.removeChild(sc2);reject(new Error('network'));};
    document.head.appendChild(sc2);
    setTimeout(()=>{if(window[cb]){delete window[cb];if(sc2.parentNode)sc2.parentNode.removeChild(sc2);reject(new Error('timeout'));}},15000);
  });
}

// ── Save: iframe GET ──
function saveToSheet(){
  const memo=prompt('\uC800\uC7A5 \uC124\uBA85\uC744 \uC785\uB825\uD558\uC138\uC694:','');
  if(memo===null)return;
  const btn=document.getElementById('btnSave');
  btn.textContent='\uC800\uC7A5 \uC911...';btn.disabled=true;
  const data=encodeURIComponent(JSON.stringify(compact(S)));
  const memoEnc=encodeURIComponent(memo);
  const ifr=document.createElement('iframe');
  ifr.style.display='none';
  ifr.src=GS_URL+'?action=save&memo='+memoEnc+'&data='+data;
  ifr.onload=function(){
    btn.textContent='\uC800\uC7A5\uB428 \u2713';
    setTimeout(()=>{btn.textContent='\uC800\uC7A5';btn.disabled=false;try{document.body.removeChild(ifr);}catch(e){}},2000);
  };
  ifr.onerror=function(){
    btn.textContent='\uC2E4\uD328 \u2717';btn.disabled=false;
    setTimeout(()=>{btn.textContent='\uC800\uC7A5';},1500);
  };
  document.body.appendChild(ifr);
}

// ── Versions ──
async function showVersions(){
  const panel=document.getElementById('verPanel');
  const overlay=document.getElementById('verOverlay');
  panel.innerHTML=`<h3>\uBC84\uC804 \uAD00\uB9AC<button class="ver-close" onclick="document.getElementById('verOverlay').classList.remove('show')">\u2715</button></h3><div class="ver-empty">\uBD88\uB7EC\uC624\uB294 \uC911...</div>`;
  overlay.classList.add('show');
  try{
    const res=await gsJsonp({action:'list'});
    if(!res||!res.ok||!res.versions||res.versions.length===0){
      panel.querySelector('.ver-empty').textContent='\uC800\uC7A5\uB41C \uBC84\uC804\uC774 \uC5C6\uC2B5\uB2C8\uB2E4.';return;
    }
    let h=`<h3>\uBC84\uC804 \uAD00\uB9AC (${res.versions.length}\uAC1C)<button class="ver-close" onclick="document.getElementById('verOverlay').classList.remove('show')">\u2715</button></h3><ul class="ver-list">`;
    res.versions.slice().reverse().forEach((v,i)=>{
      const row=res.versions.length-i;
      const d=new Date(v.time);
      const timeStr=d.toLocaleDateString('ko-KR')+' '+d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
      const m=v.memo||'';
      h+=`<li><div><div class="ver-time">v${row} \u2014 ${timeStr}</div>`;
      if(m) h+=`<div class="ver-info">${m}</div>`;
      h+=`</div><button onclick="loadVersion(${row})">\uBCF5\uC6D0</button></li>`;
    });
    h+=`</ul>`;
    panel.innerHTML=h;
  }catch(e){
    panel.querySelector('.ver-empty').textContent='\uBD88\uB7EC\uC624\uAE30 \uC2E4\uD328: '+e.message;
  }
}

async function loadVersion(row){
  if(!confirm('v'+row+'\uB85C \uBCF5\uC6D0\uD569\uB2C8\uAE4C? \uD604\uC7AC \uC0C1\uD0DC\uB97C \uB36E\uC5B4\uC501\uB2C8\uB2E4.'))return;
  try{
    const res=await gsJsonp({action:'load',row:String(row)});
    if(res&&res.ok&&res.state){
      S=typeof res.state==='string'?JSON.parse(res.state):res.state;
      if(Array.isArray(S.c)){const obj={};S.c.forEach(k=>{obj[k]=true;});S.c=obj;}
      if(!S.c)S.c={};if(!S.n)S.n={};if(!S.r)S.r={};
      sv();rNav();
      document.getElementById('verOverlay').classList.remove('show');
      if(curView)show(curView.gid,curView.sid);else showSummary();
      alert('v'+row+' \uBCF5\uC6D0 \uC644\uB8CC!');
    }else{
      alert('\uB370\uC774\uD130\uB97C \uBD88\uB7EC\uC62C \uC218 \uC5C6\uC2B5\uB2C8\uB2E4.');
    }
  }catch(e){alert('\uBCF5\uC6D0 \uC2E4\uD328: '+e.message);}
}

function rstAll(){if(!confirm('\uBAA8\uB4E0 \uCCB4\uD06C/\uBA54\uBAA8/\uB2F5\uBCC0 \uCD08\uAE30\uD654?'))return;localStorage.removeItem(SK);S={c:{},n:{},r:{}};rNav();uTP();showSummary();}
