<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <rect width="200" height="150" rx="8" fill="#1a150a"/>
  <!-- 계약서 용지 -->
  <rect x="30" y="8" width="140" height="134" rx="2" fill="#1f1a0f" stroke="#3a3020" stroke-width="0.5"/>
  <!-- 제목 -->
  <text x="100" y="26" font-family="sans-serif" font-size="11" fill="#8a7a5a" text-anchor="middle" font-weight="bold">계 약 서</text>
  <line x1="60" y1="30" x2="140" y2="30" stroke="#4a3a20" stroke-width="0.8"/>
  <!-- 조항 줄 -->
  <text x="42" y="44" font-family="sans-serif" font-size="5" fill="#6a5a3a">제1조</text>
  <rect x="58" y="39" width="100" height="4" rx="1" fill="#2a2515" opacity="0.8"/>
  <rect x="42" y="47" width="116" height="4" rx="1" fill="#2a2515" opacity="0.6"/>
  <text x="42" y="62" font-family="sans-serif" font-size="5" fill="#6a5a3a">제2조</text>
  <rect x="58" y="57" width="100" height="4" rx="1" fill="#2a2515" opacity="0.8"/>
  <rect x="42" y="65" width="90" height="4" rx="1" fill="#2a2515" opacity="0.6"/>
  <text x="42" y="80" font-family="sans-serif" font-size="5" fill="#6a5a3a">제3조</text>
  <rect x="58" y="75" width="100" height="4" rx="1" fill="#2a2515" opacity="0.8"/>
  <rect x="42" y="83" width="105" height="4" rx="1" fill="#2a2515" opacity="0.6"/>
  <rect x="42" y="91" width="70" height="4" rx="1" fill="#2a2515" opacity="0.5"/>
  <!-- 구분선 -->
  <line x1="40" y1="102" x2="160" y2="102" stroke="#3a3020" stroke-width="0.5"/>
  <!-- 서명란 甲 -->
  <text x="55" y="113" font-family="sans-serif" font-size="6" fill="#7a6a4a">甲</text>
  <line x1="65" y1="114" x2="95" y2="114" stroke="#4a3a20" stroke-width="0.5"/>
  <text x="70" y="112" font-family="sans-serif" font-size="5" fill="#5a4a2a" opacity="0.6">(서명)</text>
  <!-- 서명란 乙 -->
  <text x="115" y="113" font-family="sans-serif" font-size="6" fill="#7a6a4a">乙</text>
  <line x1="125" y1="114" x2="155" y2="114" stroke="#4a3a20" stroke-width="0.5"/>
  <text x="130" y="112" font-family="sans-serif" font-size="5" fill="#5a4a2a" opacity="0.6">(서명)</text>
  <!-- 날짜 -->
  <rect x="70" y="122" width="55" height="3" rx="1.5" fill="#8a7a5a" opacity="0.3"/>
  <!-- 도장 (빨간 원) -->
  <circle cx="152" cy="126" r="8" fill="none" stroke="#8a2222" stroke-width="1" opacity="0.7"/>
  <circle cx="152" cy="126" r="5" fill="none" stroke="#8a2222" stroke-width="0.5" opacity="0.5"/>
  <text x="152" y="129" font-family="sans-serif" font-size="5" fill="#8a2222" text-anchor="middle" opacity="0.7">印</text>
</svg>