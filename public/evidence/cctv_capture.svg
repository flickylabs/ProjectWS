<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <rect width="200" height="150" rx="8" fill="#0f0f0f"/>
  <!-- 모니터 프레임 -->
  <rect x="15" y="10" width="170" height="120" rx="4" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="18" y="13" width="164" height="114" rx="2" fill="#111111"/>
  <!-- 격자 가이드라인 -->
  <line x1="18" y1="50" x2="182" y2="50" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="18" y1="87" x2="182" y2="87" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="73" y1="13" x2="73" y2="127" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="127" y1="13" x2="127" y2="127" stroke="#1a1a1a" stroke-width="0.5"/>
  <!-- 대각선 가이드 -->
  <line x1="18" y1="13" x2="182" y2="127" stroke="#1a1a1a" stroke-width="0.3"/>
  <line x1="182" y1="13" x2="18" y2="127" stroke="#1a1a1a" stroke-width="0.3"/>
  <!-- 인물 실루엣 (추상적) -->
  <ellipse cx="100" cy="58" rx="8" ry="10" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="0.5"/>
  <path d="M88 72 Q100 66 112 72 L115 95 L85 95 Z" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="0.5"/>
  <!-- REC 표시 -->
  <circle cx="30" cy="24" r="3" fill="#cc2222"/>
  <circle cx="30" cy="24" r="3" fill="#cc2222" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="36" y="27" font-family="sans-serif" font-size="7" fill="#cc4444" font-weight="bold">REC</text>
  <!-- 카메라 번호 -->
  <rect x="148" y="20" width="24" height="3" rx="1.5" fill="#555555" opacity="0.3"/>
  <!-- 타임스탬프 (우하단) -->
  <rect x="100" y="114" width="78" height="11" fill="#0a0a0a" opacity="0.8"/>
  <rect x="105" y="119" width="68" height="3" rx="1.5" fill="#888888" opacity="0.3"/>
  <!-- 스캔라인 효과 -->
  <line x1="18" y1="35" x2="182" y2="35" stroke="#ffffff" stroke-width="0.2" opacity="0.1"/>
  <line x1="18" y1="70" x2="182" y2="70" stroke="#ffffff" stroke-width="0.2" opacity="0.1"/>
  <line x1="18" y1="105" x2="182" y2="105" stroke="#ffffff" stroke-width="0.2" opacity="0.1"/>
  <!-- 모니터 받침 -->
  <rect x="80" y="132" width="40" height="4" rx="1" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="0.5"/>
  <rect x="90" y="136" width="20" height="6" rx="1" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="0.5"/>
</svg>