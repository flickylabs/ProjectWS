<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <rect width="200" height="150" rx="8" fill="#0a0f1f"/>
  <!-- 폰 프레임 -->
  <rect x="50" y="8" width="100" height="134" rx="10" fill="#0d1228" stroke="#1a2a5a" stroke-width="0.5"/>
  <!-- 상태바 -->
  <rect x="65" y="17" width="14" height="2" rx="1" fill="#3a5a8a" opacity="0.3"/>
  <rect x="120" y="14" width="16" height="7" rx="2" fill="none" stroke="#3a5a8a" stroke-width="0.5"/>
  <rect x="121" y="15" width="10" height="5" rx="1" fill="#3a5a8a"/>
  <!-- 문자 헤더 -->
  <rect x="72" y="29" width="56" height="3" rx="1.5" fill="#5a7aba" opacity="0.3"/>
  <line x1="55" y1="38" x2="145" y2="38" stroke="#1a2a5a" stroke-width="0.5"/>
  <!-- 발신자 라벨 -->
  <text x="65" y="52" font-family="sans-serif" font-size="5" fill="#3a5a8a">발신</text>
  <!-- 메시지 버블 -->
  <rect x="60" y="56" width="80" height="50" rx="8" fill="#1a2a5a"/>
  <polygon points="60,100 55,106 64,98" fill="#1a2a5a"/>
  <rect x="66" y="63" width="60" height="5" rx="2" fill="#0d1228" opacity="0.5"/>
  <rect x="66" y="72" width="55" height="5" rx="2" fill="#0d1228" opacity="0.5"/>
  <rect x="66" y="81" width="65" height="5" rx="2" fill="#0d1228" opacity="0.5"/>
  <rect x="66" y="90" width="40" height="5" rx="2" fill="#0d1228" opacity="0.5"/>
  <!-- 타임스탬프 -->
  <rect x="60" y="113" width="50" height="2" rx="1" fill="#3a5a8a" opacity="0.3"/>
  <!-- 하단 입력란 -->
  <rect x="55" y="124" width="90" height="12" rx="6" fill="#111a3a" stroke="#1a2a5a" stroke-width="0.5"/>
  <text x="70" y="133" font-family="sans-serif" font-size="5" fill="#2a3a5a">메시지 입력...</text>
</svg>