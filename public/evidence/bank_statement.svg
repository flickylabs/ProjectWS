<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <rect width="200" height="150" rx="8" fill="#0a1f0a"/>
  <!-- 문서 영역 -->
  <rect x="20" y="12" width="160" height="126" rx="4" fill="#0d2a0d" stroke="#1a4a1a" stroke-width="0.5"/>
  <!-- 은행 로고 자리 -->
  <rect x="30" y="20" width="18" height="12" rx="2" fill="#1a4a1a"/>
  <text x="34" y="29" font-family="sans-serif" font-size="6" fill="#3a8a3a" font-weight="bold">B</text>
  <text x="54" y="29" font-family="sans-serif" font-size="9" fill="#4a9a4a" font-weight="bold">거래내역</text>
  <!-- 구분선 -->
  <line x1="30" y1="38" x2="170" y2="38" stroke="#1a4a1a" stroke-width="0.5"/>
  <!-- 헤더 -->
  <text x="35" y="48" font-family="sans-serif" font-size="6" fill="#3a7a3a">날짜</text>
  <text x="75" y="48" font-family="sans-serif" font-size="6" fill="#3a7a3a">내역</text>
  <text x="135" y="48" font-family="sans-serif" font-size="6" fill="#3a7a3a">금액</text>
  <line x1="30" y1="52" x2="170" y2="52" stroke="#1a4a1a" stroke-width="0.5"/>
  <!-- 행 1 -->
  <rect x="30" y="54" width="140" height="14" fill="#0b240b"/>
  <rect x="35" y="58" width="18" height="3" rx="1.5" fill="#3a8a3a" opacity="0.3"/>
  <rect x="56" y="56" width="60" height="8" rx="1" fill="#0d2a0d"/>
  <rect x="130" y="56" width="35" height="8" rx="1" fill="#0d2a0d"/>
  <!-- 행 2 -->
  <rect x="30" y="70" width="140" height="14" fill="#0a1f0a"/>
  <rect x="35" y="74" width="18" height="3" rx="1.5" fill="#3a8a3a" opacity="0.3"/>
  <rect x="56" y="72" width="60" height="8" rx="1" fill="#0d2a0d"/>
  <rect x="130" y="72" width="35" height="8" rx="1" fill="#0d2a0d"/>
  <!-- 행 3 -->
  <rect x="30" y="86" width="140" height="14" fill="#0b240b"/>
  <rect x="35" y="90" width="18" height="3" rx="1.5" fill="#3a8a3a" opacity="0.3"/>
  <rect x="56" y="88" width="60" height="8" rx="1" fill="#0d2a0d"/>
  <rect x="130" y="88" width="35" height="8" rx="1" fill="#0d2a0d"/>
  <!-- 행 4 -->
  <rect x="30" y="102" width="140" height="14" fill="#0a1f0a"/>
  <rect x="35" y="106" width="18" height="3" rx="1.5" fill="#3a8a3a" opacity="0.3"/>
  <rect x="56" y="104" width="60" height="8" rx="1" fill="#0d2a0d"/>
  <rect x="130" y="104" width="35" height="8" rx="1" fill="#0d2a0d"/>
  <!-- 합계란 -->
  <line x1="30" y1="120" x2="170" y2="120" stroke="#2a6a2a" stroke-width="1"/>
  <text x="35" y="130" font-family="sans-serif" font-size="7" fill="#4a9a4a" font-weight="bold">합계</text>
  <rect x="120" y="123" width="45" height="10" rx="2" fill="#1a4a1a"/>
